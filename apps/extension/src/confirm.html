<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Save to AgentClip</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: system-ui, sans-serif; margin: 0; color: #0f172a; }
      header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
      .logo { width: 24px; height: 24px; border-radius: 6px; }
      h3 { margin: 0; font-size: 14px; }
      .body { padding: 14px 16px; }
      label { font-size: 12px; color: #475569; display: block; margin-bottom: 4px; }
      textarea, input { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 9px; font-size: 13px; font-family: inherit; }
      .row { margin-bottom: 11px; }
      .actions { display: flex; gap: 8px; align-items: center; }
      button { padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; font-size: 13px; cursor: pointer; }
      button.primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
      button:hover { filter: brightness(0.97); }
      #status { font-size: 12px; margin-left: auto; }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon48.png" class="logo" alt="" />
      <h3>Save to AgentClip</h3>
    </header>
    <div class="body">
      <div class="row">
        <label>Content</label>
        <textarea id="content" rows="7"></textarea>
      </div>
      <div class="row">
        <label>Title (optional)</label>
        <input id="title" placeholder="Untitled" />
      </div>
      <div class="row">
        <label>Tags (comma-separated)</label>
        <input id="tags" placeholder="e.g. research, idea" />
      </div>
      <div class="row">
        <label>Source URL (editable)</label>
        <input id="source" placeholder="https://…" />
      </div>
      <div class="row">
        <label style="display:flex; gap:8px; align-items:flex-start; cursor:pointer; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:9px;">
          <input type="checkbox" id="encrypted" style="width:auto; margin:2px 0 0;" />
          <span style="font-size:12px; color:#475569;">
            <b style="color:#0f172a;">🔒 Encrypt this clip</b> — encrypted at rest and
            <b>excluded from search</b>. Don’t clip passwords or other secrets.
          </span>
        </label>
      </div>
      <div class="actions">
        <button id="save" class="primary">Save</button>
        <button id="cancel">Cancel</button>
        <span id="status"></span>
      </div>
    </div>
    <script src="confirm.js"></script>
  </body>
</html>
