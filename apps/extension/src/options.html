<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AgentClip</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: system-ui, sans-serif; margin: 0; width: 320px; color: #0f172a; }
      header { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid #e2e8f0; }
      .logo { width: 26px; height: 26px; border-radius: 7px; }
      h3 { margin: 0; font-size: 15px; }
      .body { padding: 14px 16px; }
      .how { background: #eef2ff; border: 1px solid #e0e7ff; border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
      .how b { color: #4338ca; font-size: 12px; }
      .how ol { margin: 6px 0 0; padding-left: 18px; font-size: 12px; color: #334155; line-height: 1.5; }
      label { font-size: 12px; color: #475569; display: block; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 7px 9px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; }
      .row { display: flex; gap: 8px; }
      button { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; font-size: 13px; cursor: pointer; }
      button.primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
      button:hover { filter: brightness(0.97); }
      a.dash { display: inline-block; margin-top: 10px; font-size: 12px; color: #4f46e5; text-decoration: none; }
      #status { font-size: 12px; margin-top: 8px; min-height: 16px; }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon48.png" class="logo" alt="" />
      <h3>AgentClip</h3>
    </header>
    <div class="body">
      <div class="how">
        <b>HOW TO SAVE</b>
        <ol>
          <li>Select text on any web page.</li>
          <li>Right-click → <b>Save to AgentClip</b>.</li>
          <li>Edit in the popup, then Save.</li>
        </ol>
      </div>

      <label>API base URL</label>
      <input id="apiBase" placeholder="https://agentclip.0xkaz.com" />
      <label>API token (ac_live_…)</label>
      <input id="token" type="password" placeholder="ac_live_…" />
      <div class="row">
        <button id="save" class="primary">Save settings</button>
        <button id="test">Test</button>
      </div>
      <a id="dash" class="dash" href="#" target="_blank">Open dashboard → manage clips & tokens</a>
      <div id="status"></div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
